name: Deploy Astro site to GitHub Pages

on:
  # 自動デプロイは無効化。ローカルでビルド・デプロイを行う（画像はgit管理外のため）
  # 手動実行は: GitHub Actions → Run workflow
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install
        working-directory: photo-archive

      - name: Build Astro
        run: npm run build
        working-directory: photo-archive

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./photo-archive/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
